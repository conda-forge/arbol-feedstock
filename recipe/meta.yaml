{% set name = "arbol" %}
{% set version = "2025.3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/arbol-{{ version }}.tar.gz
  sha256: 690cd9c348ebafb54b87a6c221a7fe65617cf05b8ae46635bbcdf30bce84fc8a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.6
  run:
    - python >=3.6

test:
  imports:
    - arbol
  commands:
    - pip list
    - pip check
  requires:
    - pip

about:
  home: https://github.com/royerlab/arbol
  summary: arbol -- Arborescent Printouts in Python
  license: BSD-3-Clause OR MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - goanpeca
